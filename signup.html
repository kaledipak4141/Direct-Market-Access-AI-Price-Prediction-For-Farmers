<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.box{
    width:320px;
    margin:100px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>

</head>
<body>

<div class="box">
<h2>Create Account</h2>

<form action="/signup" method="POST">

<input type="text" name="name" placeholder="Name" required><br><br>

<input type="email" name="email" placeholder="Email" required><br><br>

<input type="password" name="password" placeholder="Password" required><br><br>

<!-- ✅ IMPORTANT FIELD -->
<input type="text" name="address" placeholder="Enter your city / address" required><br><br>

<select name="role">
<option value="farmer">Farmer</option>
<option value="buyer">Buyer</option>
</select><br><br>

<button type="submit">Signup</button>

</form>

</div>

</body>
</html>
