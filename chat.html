<!DOCTYPE html>
<html>
<head>
<title>WhatsApp Chat UI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ece5dd;
}

/* Header */
.header{
background:#075e54;
color:white;
padding:15px;
font-size:18px;
display:flex;
align-items:center;
}

/* Chat Area */
.chat-container{
height:80vh;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* Message bubbles */
.msg{
max-width:70%;
padding:10px;
margin:5px;
border-radius:10px;
font-size:14px;
}

.left{
background:white;
align-self:flex-start;
}

.right{
background:#dcf8c6;
align-self:flex-end;
}

/* Input area */
.input-box{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#f0f0f0;
padding:10px;
}

.input-box input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
outline:none;
}

.input-box button{
margin-left:10px;
padding:10px 15px;
background:#25d366;
border:none;
color:white;
border-radius:50%;
cursor:pointer;
font-size:16px;
}
</style>

</head>

<body>

<div class="header">Farmer Chat</div>

<div class="chat-container" id="chat"></div>

<div class="input-box">
<input type="text" id="msg" placeholder="Type a message">
<button onclick="sendMsg()">➤</button>
</div>

<script>

function sendMsg(){
let msg = document.getElementById("msg").value;

if(msg=="") return;

// Right side (user)
let chat = document.getElementById("chat");

chat.innerHTML += `<div class="msg right">${msg}</div>`;

// Auto reply (demo farmer)
setTimeout(()=>{
chat.innerHTML += `<div class="msg left">Farmer: OK 👍</div>`;
chat.scrollTop = chat.scrollHeight;
},1000);

document.getElementById("msg").value="";
chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
